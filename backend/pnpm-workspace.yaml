# pnpm security settings.
# 7-day quarantine on newly published versions (mitigates fast-revoked malicious releases).
minimumReleaseAge: 10080
# Lifecycle-script allowlist. pnpm 10 blocks dependency build scripts by default.
# Prisma and esbuild ship native binaries that must be fetched/built on install.
allowBuilds:
  '@prisma/engines': true
  esbuild: true
  prisma: true
# Transitive-dep CVE pins. Audit periodically with `pnpm why <pkg>` and remove
# entries whose selector no longer matches any node in pnpm-lock.yaml.
overrides:
  'hono@<4.12.4': '>=4.12.4'
  '@hono/node-server@<1.19.10': '>=1.19.10'
  'fast-xml-parser@>=5.0.0 <5.5.6': '>=5.5.6'
  'effect@<3.20.0': '>=3.20.0'
  'lodash@>=4.0.0 <=4.17.23': '>=4.18.0'
  'defu@<=6.1.4': '>=6.1.5'
  'flatted@<3.4.2': '>=3.4.2'
  'path-to-regexp@8.2.0': '>=8.3.0'
  'picomatch@>=4.0.0 <4.0.4': '>=4.0.4'
  'rollup@>=4.0.0 <4.59.0': '>=4.59.0 <5'
  'vite@>=7.0.0 <7.3.2': '>=7.3.2 <8'
