name: Node Checks

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: "24"

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-pnpm
        with:
          working-directory: ${{ inputs.working-directory }}
          node-version: ${{ inputs.node-version }}

      - name: Generate prisma
        if: contains(inputs.working-directory, 'backend')
        run: pnpm exec prisma generate
        env:
          DATABASE_URL: postgresql://test-placeholder:test-placeholder@localhost:5432/test-placeholder

      - name: Run tests
        run: pnpm test

      - name: Check linting
        run: pnpm run lint:check

      - name: Type check
        run: pnpm run type:check

      - name: pnpm audit (fail on high/critical production deps)
        run: pnpm audit --audit-level=high --prod
