name: Build Multiple Images

on:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.name }} (${{ matrix.suffix }})
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # frontend
          - name: frontend
            image: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            build-args: |
              VITE_HOCUSPOCUS_SUBDOMAIN=write-backend
              VITE_LEGAL_URL=https://kits.blog/impressum/
              VITE_PRIVACY_STATEMENT_URL=https://kits.blog/datenschutz/#groupwriter
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - name: backend
            image: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            build-args: ""
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - name: backend
            image: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            build-args: ""
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ github.event.repository.name }}-${{ matrix.image }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          target: production
          build-args: ${{ matrix.build-args }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository }}/${{ github.event.repository.name }}-${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.image }}-${{ matrix.suffix }},mode=max

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ matrix.image }}-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    name: Merge ${{ matrix.image }} manifest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [frontend, backend]

    steps:
      - name: Download digests
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ github.event.repository.name }}-${{ matrix.image }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ github.repository }}/${{ github.event.repository.name }}-${{ matrix.image }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE_REF}@sha256:%s " *)

      - name: Inspect image
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ github.repository }}/${{ github.event.repository.name }}-${{ matrix.image }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker buildx imagetools inspect "${IMAGE_REF}:${VERSION}"
